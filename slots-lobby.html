<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Velvet Vault — Slots Lobby</title>
  <meta name="vv-protected" content="true">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/pages/slots.css" />
  <link rel="stylesheet" href="css/pages/slots-lobby.css" />
  <script src="js/runtime-config.js" defer></script>
</head>
<body class="vvTheme">
  <div id="vvBrandGlow" aria-hidden="true"></div>

  <div class="vvShell">
    <header class="vvTopbar">
      <div class="vvTopbarLeft">
        <a class="vvLogoLink" href="members.html" aria-label="Velvet Vault">
          <span class="vvLogo">VELVET VAULT</span>
          <span class="vvTag">Slots Lobby</span>
        </a>
      </div>
      <nav class="vvNav">
        <a class="vvNavItem" href="members.html">Members</a>
        <a class="vvNavItem" href="slots-lobby.html">Slots</a>
        <a class="vvNavItem" href="promotions.html">Promotions</a>
      </nav>
    </header>

    <main class="vvLobbyMain">
      <section class="vvLobbyHero">
        <div class="vvLobbyBreadcrumb">
          <span>Members</span>
          <span>›</span>
          <span>Slots</span>
        </div>
        <h1 class="vvHeroTitle">Choose Your Machine</h1>
        <p>
          Five-star floor, dark-room energy. Pick a machine tile to preview the cabinet, then enter the live slot room with the selected theme loaded.
        </p>
      </section>

      <section class="vvLobbyGridWrap">
        <div id="vvLobbyGrid" class="vvLobbyGrid" aria-label="Slot machine tiles"></div>
      </section>
    </main>
  </div>

  <div id="vvLobbyModal" class="vvLobbyModal" aria-hidden="true">
    <div class="vvLobbyModalCard" role="dialog" aria-modal="true" aria-label="Machine preview">
      <button class="vvSecondary vvLobbyClose" type="button" data-lobby-close="1">Close</button>
      <div class="vvLobbyModalBody">
        <div id="vvLobbyModalPreview" class="vvLobbyPreview"></div>
        <div class="vvLobbyMeta">
          <div class="vvLobbyBreadcrumb">
            <span>Members</span>
            <span>›</span>
            <span>Slots</span>
          </div>
          <div>
            <h2 id="vvLobbyModalTitle" class="vvHeroTitle"></h2>
            <div id="vvLobbyModalSubtitle" class="vvTag"></div>
          </div>
          <p id="vvLobbyModalDesc"></p>
          <div id="vvLobbyModalPills" class="vvLobbyPills"></div>
          <div class="vvLobbyActions">
            <a id="vvLobbyEnter" class="vvPrimary" href="slots.html">Enter</a>
            <button class="vvSecondary" type="button" data-lobby-close="1">Back</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer id="vv-footer"></footer>

  <script type="module" src="js/firebase-init.js"></script>
  <script type="module" src="js/guard.js"></script>
  <script src="js/story-engine.js"></script>
  <script src="js/story-progress.js"></script>
  <script type="module" src="js/games/slots-lobby.js"></script>
  <script type="module" src="js/ui/footer.js"></script>
  <script src="js/vv-bg-particles.js" defer></script>
</body>
</html>
