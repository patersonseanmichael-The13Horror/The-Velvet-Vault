<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Velvet Vault — Slots Lobby</title>
  <meta name="vv-protected" content="true">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/pages/slots.css" />
  <link rel="stylesheet" href="css/pages/slots-lobby.css" />
  <script src="js/runtime-config.js" defer></script>
</head>
<body class="vvTheme">
  <div id="vvBrandGlow" aria-hidden="true"></div>

  <div class="vvShell">
    <header class="vvTopbar">
      <div class="vvTopbarLeft">
        <a class="vvLogoLink" href="members.html" aria-label="Velvet Vault">
          <span class="vvLogo">VELVET VAULT</span>
          <span class="vvTag">Slots Lobby</span>
        </a>
      </div>
      <nav class="vvNav">
        <a class="vvNavItem" href="members.html">Members</a>
        <a class="vvNavItem" href="slots-lobby.html">Slots</a>
        <a class="vvNavItem" href="promotions.html">Promotions</a>
      </nav>
    </header>

    <main class="vvLobbyMain">
      <section class="vvLobbyHero">
        <div class="vvLobbyBreadcrumb">
          <span>Members</span>
          <span>›</span>
          <span>Slots</span>
        </div>
        <h1 class="vvHeroTitle">Choose Your Machine</h1>
        <p>
          Velvet Vault’s front row is open. Choose a cabinet and launch the selected slot client instantly.
        </p>
      </section>

      <section class="vvLobbyGridWrap">
        <div class="vv-slots-grid" aria-label="Slot machine tiles">
          <div class="vv-slot-card" data-slot="velvet-classic">
            <img src="images/slots/velvet-classic.png" alt="Velvet Classic slot machine poster" loading="lazy">
            <h3>Velvet Classic</h3>
            <button class="vv-play-slot" type="button">PLAY</button>
          </div>

          <div class="vv-slot-card" data-slot="midnight-gold">
            <img src="images/slots/midnight-gold.png" alt="Midnight Gold slot machine poster" loading="lazy">
            <h3>Midnight Gold</h3>
            <button class="vv-play-slot" type="button">PLAY</button>
          </div>

          <div class="vv-slot-card" data-slot="neon-diamonds">
            <img src="images/slots/neon-diamonds.png" alt="Neon Diamonds slot machine poster" loading="lazy">
            <h3>Neon Diamonds</h3>
            <button class="vv-play-slot" type="button">PLAY</button>
          </div>

          <div class="vv-slot-card" data-slot="vault-heist">
            <img src="images/slots/vault-heist.png" alt="Vault Heist slot machine poster" loading="lazy">
            <h3>Vault Heist</h3>
            <button class="vv-play-slot" type="button">PLAY</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <footer id="vv-footer"></footer>

  <script type="module" src="js/firebase-init.js"></script>
  <script type="module" src="js/guard.js"></script>
  <script src="js/story-engine.js"></script>
  <script src="js/story-progress.js"></script>
  <script type="module" src="js/games/slots-lobby.js"></script>
  <script type="module" src="js/ui/footer.js"></script>
  <script src="js/vv-bg-particles.js" defer></script>
</body>
</html>
