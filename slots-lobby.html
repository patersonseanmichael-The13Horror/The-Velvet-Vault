<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Velvet Vault — Slots Lobby</title>
  <meta name="vv-protected" content="true">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/pages/slots.css" />
  <link rel="stylesheet" href="css/pages/slots-lobby.css" />
</head>
<body class="vvTheme">
  <div id="vvBrandGlow" aria-hidden="true"></div>

  <div class="vvShell">
    <header class="vvTopbar">
      <div class="vvTopbarLeft">
        <a class="vvLogoLink" href="members.html" aria-label="Velvet Vault">
          <span class="vvLogo">VELVET VAULT</span>
          <span class="vvTag">Slots Lobby</span>
        </a>
      </div>
      <nav class="vvNav">
        <a class="vvNavItem" href="members.html">Members</a>
        <a class="vvNavItem" href="slots-lobby.html">Slots</a>
        <a class="vvNavItem" href="promotions.html">Promotions</a>
      </nav>
    </header>

    <main class="vvLobbyMain">
      <section class="vvLobbyHero">
        <div class="vvLobbyBreadcrumb">
          <span>Members</span>
          <span>›</span>
          <span>Slots</span>
        </div>
        <h1 class="vvHeroTitle">Choose Your Velvet Grade</h1>
        <p>
          Velvet Grade cabinets are now registry-driven. Pick any VG machine and launch the mapped slot client instantly.
        </p>
      </section>

      <section class="vvLobbyGridWrap">
        <div id="vgGrid" class="vv-slots-grid" aria-label="Velvet Grade machine tiles"></div>
      </section>
    </main>
  </div>

  <footer id="vv-footer"></footer>

  <script type="module" src="js/firebase-init.js"></script>
  <script type="module" src="js/guard.js"></script>
  <script src="js/story-engine.js"></script>
  <script src="js/story-progress.js"></script>
  <script src="js/runtime-config.js"></script>
  <script type="module" src="js/vg/vg-registry.js"></script>
  <script type="module" src="js/vg/vg-lobby.js"></script>
  <script type="module" src="js/ui/footer.js"></script>
  <script src="js/vv-bg-particles.js" defer></script>
